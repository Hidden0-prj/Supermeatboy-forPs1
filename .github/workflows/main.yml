name: Build Super Meat Boy

# Triggers the workflow on pushes to the master or main branch
on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Compile Java Code
      run: |
        # Navigate to the project root where src and resources live
        cd djarotech/supermeatboy/Supermeatboy-master/SupermeatBoy
        
        # Create an output directory for the compiled .class files
        mkdir -p out
        
        # Find all .java files in the src directory and compile them into /out
        find src -name "*.java" > sources.txt
        javac -d out @sources.txt

    - name: Package into Executable JAR
      run: |
        cd djarotech/supermeatboy/Supermeatboy-master/SupermeatBoy
        
        # Create a runnable jar file, setting app.MeatBoyFrame as the Main Class
        jar cfe SuperMeatBoy.jar app.MeatBoyFrame -C out .

    - name: Upload Playable Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SuperMeatBoy-Release
        # Upload both the compiled JAR and the resources folder together
        path: |
          djarotech/supermeatboy/Supermeatboy-master/SupermeatBoy/SuperMeatBoy.jar
          djarotech/supermeatboy/Supermeatboy-master/SupermeatBoy/resources/
